<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gastos</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #f5f5f0;
  --card: #ffffff;
  --text: #1a1a1a;
  --muted: #7a7a7a;
  --accent: #10b981;
  --accent-light: #ecfdf5;
  --border: #e5e5e0;
  --shadow: 0 1px 3px rgba(0,0,0,0.06);
}
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 0;
}

/* Toast */
.toast {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  background: var(--accent);
  color: white;
  text-align: center;
  padding: 14px 20px;
  font-size: 14px;
  font-weight: 500;
  z-index: 1000;
  transform: translateY(-100%);
  transition: transform 0.25s ease;
}
.toast.show { transform: translateY(0); }

/* Header */
.header {
  padding: 24px 20px 16px;
  max-width: 480px;
  margin: 0 auto;
}
.header h1 {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.5px;
}
.month-nav {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 4px;
}
.month-label {
  font-size: 14px;
  color: var(--muted);
}
.month-picker-wrap {
  position: relative;
  display: inline-block;
}
.month-picker {
  display: flex;
  align-items: center;
  gap: 4px;
  cursor: pointer;
  padding: 2px 0;
  user-select: none;
}
.month-chevron {
  font-size: 10px;
  color: var(--muted);
  transition: transform 0.15s;
  line-height: 1;
}
.month-picker.open .month-chevron { transform: rotate(180deg); }
.month-dropdown {
  position: absolute;
  top: calc(100% + 6px);
  left: 0;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.1);
  z-index: 50;
  min-width: 160px;
  display: none;
  overflow: hidden;
}
.month-dropdown.open { display: block; }
.month-dropdown-item {
  padding: 10px 16px;
  font-size: 14px;
  cursor: pointer;
  transition: background 0.1s;
  color: var(--text);
}
.month-dropdown-item:hover { background: var(--accent-light); }
.month-dropdown-item.selected { font-weight: 600; color: var(--accent); }

/* Summary */
.summary {
  max-width: 480px;
  margin: 0 auto;
  padding: 0 20px;
  display: flex;
  gap: 12px;
}
.summary-card {
  flex: 1;
  background: var(--card);
  border-radius: 12px;
  padding: 16px;
  box-shadow: var(--shadow);
}
.summary-card .label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--muted);
  font-weight: 500;
}
.summary-card .amount {
  font-size: 24px;
  font-weight: 700;
  margin-top: 4px;
}
.summary-card .count {
  font-size: 12px;
  color: var(--muted);
  margin-top: 2px;
}

/* Budget section */
.budget-section {
  max-width: 480px;
  margin: 12px auto 0;
  padding: 0 20px;
}
.budget-btn {
  background: none;
  border: 1.5px solid var(--border);
  color: var(--muted);
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  font-weight: 500;
  padding: 7px 14px;
  border-radius: 8px;
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s;
}
.budget-btn:hover { color: var(--accent); border-color: var(--accent); }

/* Insights */
.insights {
  max-width: 480px;
  margin: 16px auto 0;
  padding: 0 20px;
}
.insights h2 {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 8px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.insight-card {
  padding: 10px 12px;
  border-radius: 8px;
  background: var(--card);
  margin-bottom: 6px;
  font-size: 13px;
  line-height: 1.4;
  box-shadow: var(--shadow);
  border-left: 3px solid;
}
.insight-red { border-left-color: #ef4444; }
.insight-green { border-left-color: #10b981; }
.insight-gray { border-left-color: #8a8a8a; }

/* Categories */
.categories {
  max-width: 480px;
  margin: 20px auto 0;
  padding: 0 20px;
}
.categories h2 {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 10px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.cat-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.cat-row {
  display: flex;
  flex-direction: column;
  background: var(--card);
  padding: 12px 16px;
  border-radius: 10px;
  box-shadow: var(--shadow);
}
.cat-row-main {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.cat-row .cat-name {
  font-size: 14px;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 8px;
}
.cat-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  display: inline-block;
}
.cat-row .cat-amount {
  font-size: 14px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 6px;
}
.cat-change {
  font-size: 12px;
  font-weight: 500;
}
.budget-bar {
  height: 4px;
  border-radius: 2px;
  background: var(--border);
  margin-top: 8px;
  overflow: hidden;
}
.budget-bar-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.3s ease;
}

/* Recent */
.recent {
  max-width: 480px;
  margin: 20px auto 0;
  padding: 0 20px 100px;
}
.recent h2 {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 10px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.expense-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
}
.expense-item:last-child { border-bottom: none; }
.expense-left {
  display: flex;
  flex-direction: column;
  gap: 2px;
  flex: 1;
}
.expense-desc {
  font-size: 14px;
  font-weight: 500;
}
.expense-meta {
  font-size: 12px;
  color: var(--muted);
}
.expense-right {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}
.expense-amount {
  font-size: 15px;
  font-weight: 600;
}
.delete-btn {
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  padding: 4px 5px;
  font-size: 13px;
  opacity: 0.3;
  transition: opacity 0.15s;
  line-height: 1;
}
.expense-item:hover .delete-btn { opacity: 1; }
.delete-confirm {
  display: flex;
  align-items: center;
  gap: 6px;
}
.delete-confirm-text {
  font-size: 12px;
  color: var(--muted);
  white-space: nowrap;
}
.delete-yes {
  background: #ef4444;
  color: white;
  border: none;
  border-radius: 6px;
  padding: 4px 10px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
}
.delete-no {
  background: none;
  color: var(--muted);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 10px;
  font-size: 12px;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
}

/* Add button */
.fab {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--accent);
  color: white;
  border: none;
  padding: 14px 28px;
  border-radius: 50px;
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  box-shadow: 0 4px 12px rgba(16,185,129,0.35);
  transition: transform 0.15s, box-shadow 0.15s;
  z-index: 100;
}
.fab:active { transform: translateX(-50%) scale(0.96); }

/* Modal */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.3);
  z-index: 200;
  justify-content: center;
  align-items: flex-end;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--card);
  width: 100%;
  max-width: 480px;
  border-radius: 20px 20px 0 0;
  padding: 24px 20px 32px;
  animation: slideUp 0.25s ease;
}
@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}
.modal h2 {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 20px;
}
.modal .field {
  margin-bottom: 16px;
}
.modal label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
}
.modal input, .modal select {
  width: 100%;
  padding: 12px 14px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  background: var(--bg);
  color: var(--text);
  outline: none;
  transition: border-color 0.15s;
}
.modal input:focus, .modal select:focus {
  border-color: var(--accent);
}
.modal .actions {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}
.btn {
  flex: 1;
  padding: 14px;
  border: none;
  border-radius: 10px;
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.15s;
}
.btn:active { opacity: 0.8; }
.btn-primary {
  background: var(--accent);
  color: white;
}
.btn-secondary {
  background: var(--bg);
  color: var(--text);
}

/* Budget modal scroll area */
.budget-fields {
  max-height: 45vh;
  overflow-y: auto;
}

/* Custom category input */
#customCatField { display: none; margin-top: 10px; }

/* Empty state */
.empty {
  text-align: center;
  padding: 40px 20px;
  color: var(--muted);
  font-size: 14px;
}

/* Loading */
.loading {
  text-align: center;
  padding: 20px;
  color: var(--muted);
  font-size: 13px;
}

/* Auth screen */
.auth-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 20px;
}
.auth-box {
  width: 100%;
  max-width: 360px;
  text-align: center;
}
.auth-box h1 {
  font-size: 32px;
  font-weight: 700;
  margin-bottom: 8px;
  letter-spacing: -0.5px;
}
.auth-box .subtitle {
  color: var(--muted);
  font-size: 14px;
  margin-bottom: 32px;
}
.auth-box input {
  width: 100%;
  padding: 14px 16px;
  border: 1.5px solid var(--border);
  border-radius: 12px;
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  background: var(--card);
  color: var(--text);
  outline: none;
  margin-bottom: 12px;
  transition: border-color 0.15s;
}
.auth-box input:focus { border-color: var(--accent); }
.auth-box .btn-login {
  width: 100%;
  padding: 14px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 12px;
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
}
.auth-box .btn-login:active { opacity: 0.8; }
.auth-box .msg {
  margin-top: 16px;
  font-size: 13px;
  color: var(--accent);
}
.auth-box .err {
  margin-top: 16px;
  font-size: 13px;
  color: #ef4444;
}
.logout-btn {
  background: none;
  border: none;
  color: var(--muted);
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  cursor: pointer;
  padding: 4px 8px;
}
.logout-btn:hover { color: var(--accent); }
.app-content { display: none; }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- Auth Screen -->
<div class="auth-screen" id="authScreen">
  <div class="auth-box">
    <h1>Gastos</h1>
    <!-- Step 1: Email -->
    <div id="authStep1">
      <p class="subtitle">Ingresá tu email para recibir un código</p>
      <input type="email" id="authEmail" placeholder="tu@email.com" autocomplete="email">
      <button class="btn-login" onclick="sendOTP()">Enviar código</button>
    </div>
    <!-- Step 2: OTP -->
    <div id="authStep2" style="display:none;">
      <p class="subtitle">Ingresá el código de 6 dígitos que te llegó al mail</p>
      <input type="text" id="authOTP" placeholder="123456" maxlength="6" inputmode="numeric" autocomplete="one-time-code" style="text-align:center;font-size:24px;letter-spacing:8px;font-weight:700;">
      <button class="btn-login" onclick="verifyOTP()">Verificar</button>
      <p style="margin-top:12px;font-size:12px;color:var(--muted);cursor:pointer;" onclick="backToEmail()">Cambiar email</p>
    </div>
    <div id="authMsg"></div>
  </div>
</div>

<!-- App Content (hidden until logged in) -->
<div class="app-content" id="appContent">

<div class="header">
  <div style="display:flex;justify-content:space-between;align-items:center;">
    <h1>Gastos</h1>
    <button class="logout-btn" onclick="logout()">Salir</button>
  </div>
  <div class="month-nav">
    <div class="month-picker-wrap" id="monthPickerWrap">
      <div class="month-picker" id="monthPicker" onclick="toggleMonthDropdown()">
        <span class="month-label" id="currentMonth"></span>
        <span class="month-chevron">▾</span>
      </div>
      <div class="month-dropdown" id="monthDropdown"></div>
    </div>
  </div>
</div>

<div class="summary">
  <div class="summary-card">
    <div class="label">Total del mes</div>
    <div class="amount" id="totalAmount">$0</div>
    <div class="count" id="totalCount">0 gastos</div>
  </div>
  <div class="summary-card">
    <div class="label">Promedio</div>
    <div class="amount" id="avgAmount">$0</div>
    <div class="count">por gasto</div>
  </div>
</div>

<div class="budget-section">
  <button class="budget-btn" onclick="openBudgetModal()">Definir presupuesto</button>
</div>

<div class="insights" id="insightsSection" style="display:none;">
  <h2>Insights</h2>
  <div id="insightsList"></div>
</div>

<div class="categories">
  <h2>Por categoría</h2>
  <div class="cat-list" id="catList">
    <div class="loading">Cargando...</div>
  </div>
</div>

<div class="recent">
  <h2>Últimos gastos</h2>
  <div id="expenseList">
    <div class="loading">Cargando...</div>
  </div>
</div>

<button class="fab" onclick="openModal()">+ Nuevo gasto</button>

</div><!-- end app-content -->

<!-- Expense modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeIfOverlay(event)">
  <div class="modal">
    <h2>Nuevo gasto</h2>
    <div class="field">
      <label>Monto ($)</label>
      <input type="number" id="inputAmount" placeholder="0" inputmode="decimal" step="0.01">
    </div>
    <div class="field">
      <label>Categoría</label>
      <select id="inputCategory" onchange="onCategoryChange()">
        <option value="Comida">Comida</option>
        <option value="Transporte">Transporte</option>
        <option value="Entretenimiento">Entretenimiento</option>
        <option value="Salud">Salud</option>
        <option value="Suscripciones">Suscripciones</option>
        <option value="__custom__">Otra...</option>
      </select>
      <div id="customCatField">
        <input type="text" id="inputCustomCat" placeholder="Escribí la categoría">
      </div>
    </div>
    <div class="field">
      <label>Fecha</label>
      <input type="date" id="inputDate">
    </div>
    <div class="field">
      <label>Descripción (opcional)</label>
      <input type="text" id="inputDesc" placeholder="Qué pagaste">
    </div>
    <div class="actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="saveExpenseBtn" onclick="saveExpense()">Guardar</button>
    </div>
  </div>
</div>

<!-- Budget modal -->
<div class="modal-overlay" id="budgetModalOverlay" onclick="closeBudgetIfOverlay(event)">
  <div class="modal">
    <h2>Presupuesto mensual</h2>
    <div class="budget-fields" id="budgetFields"></div>
    <div class="actions">
      <button class="btn btn-secondary" onclick="closeBudgetModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveBudgets()">Guardar</button>
    </div>
  </div>
</div>

<script>
// ---- CONFIG ----
const SUPABASE_URL = 'https://omdoddkgdwwpgdinhxrw.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9tZG9kZGtnZHd3cGdkaW5oeHJ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MDk0NDgsImV4cCI6MjA5MjQ4NTQ0OH0.gMag7UoSuz0L2jqrLpo8w0jYdlqrGPfW9ysIEHVSk6Q';

const CAT_COLORS = {
  'Comida': '#10b981',
  'Transporte': '#6366f1',
  'Entretenimiento': '#a855f7',
  'Salud': '#ef4444',
  'Suscripciones': '#f59e0b'
};

const DEFAULT_CATS = ['Comida', 'Transporte', 'Entretenimiento', 'Salud', 'Suscripciones'];

function esc(str) {
  return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ---- AUTH ----
let accessToken = null;
let currentUser = null;

async function getStoredSession() {
  try {
    const s = JSON.parse(localStorage.getItem('sb_session'));
    if (s && s.access_token && s.expires_at > Date.now() / 1000) return s;
    if (s && s.refresh_token) return await refreshSession(s.refresh_token);
  } catch(e) {}
  return null;
}

async function refreshSession(refreshToken) {
  try {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=refresh_token`, {
      method: 'POST',
      headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ refresh_token: refreshToken })
    });
    if (!res.ok) return null;
    const data = await res.json();
    saveSession(data);
    return data;
  } catch(e) { return null; }
}

function saveSession(data) {
  localStorage.setItem('sb_session', JSON.stringify({
    access_token: data.access_token,
    refresh_token: data.refresh_token,
    expires_at: data.expires_at || (Date.now()/1000 + 3600),
    user: data.user
  }));
  accessToken = data.access_token;
  currentUser = data.user;
}

let pendingEmail = '';

async function sendOTP() {
  const email = document.getElementById('authEmail').value.trim();
  if (!email) return;
  pendingEmail = email;
  const btn = document.querySelector('#authStep1 .btn-login');
  btn.textContent = 'Enviando...';
  btn.disabled = true;
  try {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/otp`, {
      method: 'POST',
      headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    if (res.ok) {
      document.getElementById('authStep1').style.display = 'none';
      document.getElementById('authStep2').style.display = 'block';
      document.getElementById('authMsg').innerHTML = '';
      setTimeout(() => document.getElementById('authOTP').focus(), 100);
    } else {
      const err = await res.json();
      document.getElementById('authMsg').innerHTML = `<div class="err">Error: ${esc(err.msg || err.error_description || 'Intenta de nuevo')}</div>`;
    }
  } catch(e) {
    document.getElementById('authMsg').innerHTML = `<div class="err">Error de conexión</div>`;
  }
  btn.textContent = 'Enviar código';
  btn.disabled = false;
}

async function verifyOTP() {
  const token = document.getElementById('authOTP').value.trim();
  if (!token || token.length !== 6) return;
  const btn = document.querySelector('#authStep2 .btn-login');
  btn.textContent = 'Verificando...';
  btn.disabled = true;
  try {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/verify`, {
      method: 'POST',
      headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: pendingEmail, token, type: 'email' })
    });
    if (res.ok) {
      const data = await res.json();
      saveSession(data);
      showApp();
    } else {
      document.getElementById('authMsg').innerHTML = `<div class="err">Código incorrecto o expirado</div>`;
    }
  } catch(e) {
    document.getElementById('authMsg').innerHTML = `<div class="err">Error de conexión</div>`;
  }
  btn.textContent = 'Verificar';
  btn.disabled = false;
}

function backToEmail() {
  document.getElementById('authStep1').style.display = 'block';
  document.getElementById('authStep2').style.display = 'none';
  document.getElementById('authMsg').innerHTML = '';
}

function logout() {
  localStorage.removeItem('sb_session');
  accessToken = null;
  currentUser = null;
  showAuth();
}

function showAuth() {
  document.getElementById('authScreen').style.display = 'flex';
  document.getElementById('appContent').style.display = 'none';
}

function showApp() {
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('appContent').style.display = 'block';
  loadExpenses();
}

// Handle magic link callback (token in URL hash)
function handleAuthCallback() {
  const hash = window.location.hash;
  if (hash && hash.includes('access_token')) {
    const params = new URLSearchParams(hash.substring(1));
    const access_token = params.get('access_token');
    const refresh_token = params.get('refresh_token');
    const expires_in = parseInt(params.get('expires_in') || '3600');
    if (access_token) {
      saveSession({
        access_token,
        refresh_token,
        expires_at: Date.now()/1000 + expires_in,
        user: { id: 'pending' }
      });
      // Get user info
      fetch(`${SUPABASE_URL}/auth/v1/user`, {
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${access_token}` }
      }).then(r => r.json()).then(user => {
        currentUser = user;
        const s = JSON.parse(localStorage.getItem('sb_session'));
        s.user = user;
        localStorage.setItem('sb_session', JSON.stringify(s));
      });
      window.location.hash = '';
      return true;
    }
  }
  return false;
}

// ---- SUPABASE HELPERS ----
async function supaFetch(path, opts = {}) {
  const token = accessToken || SUPABASE_KEY;
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${token}`,
      'Content-Type': 'application/json',
      'Prefer': opts.prefer || 'return=representation'
    },
    method: opts.method || 'GET',
    body: opts.body ? JSON.stringify(opts.body) : undefined
  });
  if (!res.ok) throw new Error(`${res.status}: ${await res.text()}`);
  if (res.status === 204) return null;
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

// ---- DATA ----
let expenses = [];
let prevExpenses = [];
let histMonths = [[], []]; // [2 months ago, 3 months ago]
let viewYear = new Date().getFullYear();
let viewMonth = new Date().getMonth();

function monthRange(year, month) {
  return {
    start: new Date(year, month, 1).toISOString().split('T')[0],
    end: new Date(year, month + 1, 0).toISOString().split('T')[0]
  };
}

function offsetMonth(year, month, delta) {
  let m = month + delta;
  let y = year;
  while (m < 0) { m += 12; y--; }
  while (m > 11) { m -= 12; y++; }
  return { year: y, month: m };
}

async function loadExpenses() {
  const { start, end } = monthRange(viewYear, viewMonth);
  const p1 = offsetMonth(viewYear, viewMonth, -1);
  const { start: p1s, end: p1e } = monthRange(p1.year, p1.month);
  const p2 = offsetMonth(viewYear, viewMonth, -2);
  const { start: p2s, end: p2e } = monthRange(p2.year, p2.month);
  const p3 = offsetMonth(viewYear, viewMonth, -3);
  const { start: p3s, end: p3e } = monthRange(p3.year, p3.month);

  try {
    const [curr, prev1, hist2, hist3] = await Promise.all([
      supaFetch(`expenses?date=gte.${start}&date=lte.${end}&order=created_at.desc`),
      supaFetch(`expenses?date=gte.${p1s}&date=lte.${p1e}&order=created_at.desc`),
      supaFetch(`expenses?date=gte.${p2s}&date=lte.${p2e}&order=created_at.desc`),
      supaFetch(`expenses?date=gte.${p3s}&date=lte.${p3e}&order=created_at.desc`),
    ]);
    expenses = curr || [];
    prevExpenses = prev1 || [];
    histMonths = [hist2 || [], hist3 || []];
  } catch (e) {
    console.error('Error loading:', e);
    expenses = [];
    prevExpenses = [];
    histMonths = [[], []];
  }
  render();
}

async function addExpense(amount, category, description, date) {
  const item = {
    amount: parseFloat(amount),
    category,
    description: description || null,
    date: date || new Date().toISOString().split('T')[0],
    user_id: currentUser ? currentUser.id : null
  };
  await supaFetch('expenses', { method: 'POST', body: item });
  await loadExpenses();
}

// ---- DELETE ----
let pendingDeleteId = null;

function confirmDelete(id) {
  pendingDeleteId = id;
  render();
}

function cancelDelete() {
  pendingDeleteId = null;
  render();
}

async function executeDelete(id) {
  try {
    await supaFetch(`expenses?id=eq.${id}`, { method: 'DELETE', prefer: 'return=minimal' });
    pendingDeleteId = null;
    await loadExpenses();
  } catch (e) {
    alert('Error al borrar: ' + e.message);
  }
}

// ---- MONTH NAV ----
function buildMonthDropdown() {
  const months = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const now = new Date();
  const items = [];
  for (let i = 0; i < 12; i++) {
    let m = now.getMonth() - i;
    let y = now.getFullYear();
    if (m < 0) { m += 12; y--; }
    const isSelected = y === viewYear && m === viewMonth;
    items.push(`<div class="month-dropdown-item${isSelected ? ' selected' : ''}" onclick="selectMonth(${y}, ${m})">${months[m]} ${y}</div>`);
  }
  document.getElementById('monthDropdown').innerHTML = items.join('');
}

function toggleMonthDropdown() {
  const dropdown = document.getElementById('monthDropdown');
  const picker = document.getElementById('monthPicker');
  if (dropdown.classList.contains('open')) {
    dropdown.classList.remove('open');
    picker.classList.remove('open');
  } else {
    buildMonthDropdown();
    dropdown.classList.add('open');
    picker.classList.add('open');
  }
}

function selectMonth(year, month) {
  viewYear = year;
  viewMonth = month;
  pendingDeleteId = null;
  document.getElementById('monthDropdown').classList.remove('open');
  document.getElementById('monthPicker').classList.remove('open');
  loadExpenses();
}

document.addEventListener('click', function(e) {
  if (!e.target.closest('#monthPickerWrap')) {
    document.getElementById('monthDropdown').classList.remove('open');
    document.getElementById('monthPicker').classList.remove('open');
  }
});

// ---- TOAST ----
let toastTimer = null;

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
}

// ---- BUDGET ----
function getBudgets() {
  try { return JSON.parse(localStorage.getItem('budgets')) || {}; }
  catch(e) { return {}; }
}

function openBudgetModal() {
  const budgets = getBudgets();
  const activeCats = [...new Set([
    ...DEFAULT_CATS,
    ...expenses.map(e => e.category)
  ])];
  document.getElementById('budgetFields').innerHTML = activeCats.map(cat => `
    <div class="field">
      <label>${esc(cat)}</label>
      <input type="number" data-cat="${esc(cat)}" placeholder="Sin límite" inputmode="decimal"
        value="${budgets[cat] || ''}" min="0" step="1">
    </div>
  `).join('');
  document.getElementById('budgetModalOverlay').classList.add('open');
}

function closeBudgetModal() {
  document.getElementById('budgetModalOverlay').classList.remove('open');
}

function closeBudgetIfOverlay(e) {
  if (e.target === document.getElementById('budgetModalOverlay')) closeBudgetModal();
}

function saveBudgets() {
  const inputs = document.querySelectorAll('#budgetFields input[data-cat]');
  const budgets = {};
  inputs.forEach(input => {
    const val = parseFloat(input.value);
    if (val > 0) budgets[input.dataset.cat] = val;
  });
  localStorage.setItem('budgets', JSON.stringify(budgets));
  closeBudgetModal();
  render();
  showToast('✓ Presupuesto guardado');
}

// ---- RENDER ----
function fmt(n) {
  return '$' + Number(n).toLocaleString('es-UY', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}

function catTotals(arr) {
  const totals = {};
  arr.forEach(e => { totals[e.category] = (totals[e.category] || 0) + Number(e.amount); });
  return totals;
}

function renderSummary(total) {
  document.getElementById('totalAmount').textContent = fmt(total);
  document.getElementById('totalCount').textContent = `${expenses.length} gasto${expenses.length !== 1 ? 's' : ''}`;
  document.getElementById('avgAmount').textContent = expenses.length ? fmt(total / expenses.length) : '$0';
}

function renderCategories(sortedCats, prevCats, budgets) {
  const catList = document.getElementById('catList');
  if (sortedCats.length === 0) {
    catList.innerHTML = '<div class="empty">Sin gastos este mes</div>';
    return;
  }
  catList.innerHTML = sortedCats.map(([cat, amt]) => {
    let changeHtml = '';
    if (prevCats[cat] !== undefined && prevCats[cat] > 0) {
      const pct = Math.round(((amt - prevCats[cat]) / prevCats[cat]) * 100);
      if (pct > 0) changeHtml = `<span class="cat-change" style="color:#ef4444">↑${pct}%</span>`;
      else if (pct < 0) changeHtml = `<span class="cat-change" style="color:#10b981">↓${Math.abs(pct)}%</span>`;
      else changeHtml = `<span class="cat-change" style="color:#8a8a8a">—</span>`;
    }
    let barHtml = '';
    if (budgets[cat]) {
      const fillPct = (amt / budgets[cat]) * 100;
      const widthPct = Math.min(fillPct, 100);
      const barColor = fillPct > 100 ? '#ef4444' : fillPct > 80 ? '#f97316' : fillPct > 60 ? '#f59e0b' : '#10b981';
      barHtml = `<div class="budget-bar"><div class="budget-bar-fill" style="width:${widthPct}%;background:${barColor}"></div></div>`;
    }
    return `
      <div class="cat-row">
        <div class="cat-row-main">
          <span class="cat-name">
            <span class="cat-dot" style="background:${CAT_COLORS[cat] || '#8a8a8a'}"></span>
            ${esc(cat)}
          </span>
          <span class="cat-amount">${fmt(amt)}${changeHtml}</span>
        </div>
        ${barHtml}
      </div>
    `;
  }).join('');
}

function renderInsights(sortedCats, prevCats, budgets, total) {
  const insights = [];
  sortedCats.forEach(([cat, amt]) => {
    const prev = prevCats[cat];
    if (prev > 0) {
      const pct = Math.round(((amt - prev) / prev) * 100);
      if (pct > 20) insights.push({ type: 'red', text: `Gastaste ${pct}% más en ${esc(cat)} que el mes pasado` });
    }
  });
  const prevTotals = [
    prevExpenses.reduce((s, e) => s + Number(e.amount), 0),
    ...histMonths.map(arr => arr.reduce((s, e) => s + Number(e.amount), 0))
  ].filter(t => t > 0);
  if (prevTotals.length > 0 && total > 0) {
    const avg = prevTotals.reduce((a, b) => a + b, 0) / prevTotals.length;
    if (avg > 0) {
      const pct = Math.round(((total - avg) / avg) * 100);
      if (pct > 10) insights.push({ type: 'red', text: `Este mes vas ${pct}% por encima de tu promedio` });
    }
  }
  sortedCats.forEach(([cat, amt]) => {
    if (budgets[cat] && amt > budgets[cat])
      insights.push({ type: 'red', text: `${esc(cat)} superó el presupuesto en ${fmt(amt - budgets[cat])}` });
  });
  const insightsSection = document.getElementById('insightsSection');
  const insightsList = document.getElementById('insightsList');
  const topInsights = insights.slice(0, 3);
  if (topInsights.length === 0) {
    insightsSection.style.display = 'none';
  } else {
    insightsSection.style.display = 'block';
    insightsList.innerHTML = topInsights.map(i =>
      `<div class="insight-card insight-${i.type}">${i.text}</div>`
    ).join('');
  }
}

function renderExpenses() {
  const list = document.getElementById('expenseList');
  if (expenses.length === 0) {
    list.innerHTML = '<div class="empty">Cargá tu primer gasto</div>';
    return;
  }
  list.innerHTML = expenses.slice(0, 20).map(e => {
    const d = new Date(e.date + 'T12:00:00');
    const dateStr = d.toLocaleDateString('es-UY', { day: 'numeric', month: 'short' });
    const isPending = e.id === pendingDeleteId;
    const rightContent = isPending
      ? `<div class="delete-confirm">
           <span class="delete-confirm-text">¿Seguro?</span>
           <button class="delete-yes" onclick="executeDelete('${esc(e.id)}')">Sí</button>
           <button class="delete-no" onclick="cancelDelete()">No</button>
         </div>`
      : `<span class="expense-amount">${fmt(e.amount)}</span>
         <button class="delete-btn" onclick="confirmDelete('${esc(e.id)}')" title="Borrar">✕</button>`;
    return `
      <div class="expense-item">
        <div class="expense-left">
          <span class="expense-desc">${esc(e.description || e.category)}</span>
          <span class="expense-meta">${esc(e.category)} · ${dateStr}</span>
        </div>
        <div class="expense-right">${rightContent}</div>
      </div>
    `;
  }).join('');
}

function render() {
  const months = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  document.getElementById('currentMonth').textContent = `${months[viewMonth]} ${viewYear}`;

  const total = expenses.reduce((s, e) => s + Number(e.amount), 0);
  const cats = catTotals(expenses);
  const prevCats = catTotals(prevExpenses);
  const budgets = getBudgets();
  const sortedCats = Object.entries(cats).sort((a, b) => b[1] - a[1]);

  renderSummary(total);
  renderCategories(sortedCats, prevCats, budgets);
  renderInsights(sortedCats, prevCats, budgets, total);
  renderExpenses();
}

// ---- MODAL ----
function onCategoryChange() {
  const val = document.getElementById('inputCategory').value;
  document.getElementById('customCatField').style.display = val === '__custom__' ? 'block' : 'none';
}

function openModal() {
  document.getElementById('modalOverlay').classList.add('open');
  document.getElementById('inputAmount').value = '';
  document.getElementById('inputDesc').value = '';
  document.getElementById('inputCategory').selectedIndex = 0;
  document.getElementById('customCatField').style.display = 'none';
  document.getElementById('inputCustomCat').value = '';
  document.getElementById('inputDate').value = new Date().toISOString().split('T')[0];
  setTimeout(() => document.getElementById('inputAmount').focus(), 100);
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}
function closeIfOverlay(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}
async function saveExpense() {
  const amount = document.getElementById('inputAmount').value;
  let category = document.getElementById('inputCategory').value;
  if (category === '__custom__') {
    category = document.getElementById('inputCustomCat').value.trim();
    if (!category) {
      document.getElementById('inputCustomCat').style.borderColor = 'var(--accent)';
      return;
    }
  }
  const desc = document.getElementById('inputDesc').value;
  const date = document.getElementById('inputDate').value;
  if (!amount || parseFloat(amount) <= 0) {
    document.getElementById('inputAmount').style.borderColor = 'var(--accent)';
    return;
  }
  const btn = document.getElementById('saveExpenseBtn');
  btn.textContent = '...';
  btn.disabled = true;
  try {
    await addExpense(amount, category, desc, date);
    closeModal();
    showToast('✓ Guardado');
  } catch (e) {
    alert('Error al guardar: ' + e.message);
  }
  btn.textContent = 'Guardar';
  btn.disabled = false;
}

// ---- INIT ----
(async function init() {
  // Check for magic link callback
  if (handleAuthCallback()) {
    showApp();
    return;
  }
  // Check stored session
  const session = await getStoredSession();
  if (session) {
    accessToken = session.access_token;
    currentUser = session.user;
    showApp();
  } else {
    showAuth();
  }
})();
</script>
